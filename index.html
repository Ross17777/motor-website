const checks=['发动机冷车启动是否顺畅','怠速是否稳定','是否有异响或敲缸声','车架/方向柱/限位块是否有摔车痕迹','前后减震是否漏油','刹车盘是否磨损严重或变形','链条和牙盘是否磨损到极限','轮胎年份、补胎和偏磨程度','仪表公里数与磨损是否匹配','车架号、发动机号、手续是否一致'];

const labels={displacement:'排量',engineType:'发动机类型',seatHeight:'座高',curbWeight:'整备质量',fuelTank:'油箱容量',frontWheel:'前轮规格',rearWheel:'后轮规格',oil:'机油建议',chain:'链条规格',battery:'电瓶型号',spark:'火花塞型号'};let role='dealer',activeTab='overview',current=null;
function norm(v){return String(v).toLowerCase().replace(/[\s\-_./]/g,'').trim()}function find(q){const nq=norm(q);if(!nq)return null;const scored=motorcycles.map(m=>{const hay=[m.name,m.brand,m.model,m.slug,...m.aliases];const score=hay.some(x=>norm(x)===nq)?100:hay.some(x=>norm(x).includes(nq)||nq.includes(norm(x)))?60:0;return{m,score}}).sort((a,b)=>b.score-a.score);return scored[0].score?scored[0].m:null}function row(a,b){return`<div class="row"><span>${a}</span><span>${b}</span></div>`}function panel(t,h,alt=false){return`<section class="panel ${alt?'alt':''}"><h3>${t}</h3>${h}</section>`}function chips(xs,cls='chip'){return`<div class="chips">${xs.map(x=>`<div class="${cls}">${x}</div>`).join('')}</div>`}function productBlock(title,items){return`<section class="panel alt"><h3>${title}</h3><div class="cards product-grid">${items.map(([scene,name,note])=>`<article class="product"><div class="product-head"><h4>${name}</h4><em>${scene}</em></div><p>${note}</p><div class="tag-row"><span class="tag">购买前核对规格</span><span class="tag">适配优先</span></div></article>`).join('')}</div></section>`}
function renderHome(){document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.role===role));document.getElementById('modelGrid').innerHTML=motorcycles.map(m=>`<button class="model" data-model="${m.name}"><div class="top"><span>${m.brand}</span><span>风险 ${m.dealer.risk}</span></div><strong>${m.model}</strong><small>${m.basic.displacement} · ${m.basic.frontWheel} / ${m.basic.rearWheel}</small></button>`).join('');document.getElementById('quick').innerHTML=motorcycles.map(m=>`<button class="btn ghost" data-model="${m.name}">${m.name}</button>`).join('');document.querySelectorAll('[data-model]').forEach(b=>b.onclick=()=>search(b.dataset.model))}
function render(){if(!current)return;document.getElementById('home').style.display='none';document.getElementById('result').style.display='block';document.querySelectorAll('[data-search] input').forEach(i=>i.value=current.name);const b=current.basic,d=current.dealer,r=current.rider,p=current.products;const tabs=['overview','check','products','trade'];const names={overview:'概览',check:'查验',products:'耗材',trade:role==='dealer'?'收车':'保养'};let html=`<section class="summary"><div class="summary-head"><div><p>${current.brand}</p><h2>${current.model}</h2><div class="note">${role==='dealer'?d.tradeFit:r.level}</div></div><span class="risk">风险 ${d.risk}</span></div><div class="kpis"><div class="kpi"><span>排量</span><b>${b.displacement}</b></div><div class="kpi"><span>座高</span><b>${b.seatHeight}</b></div><div class="kpi"><span>轮胎</span><b>${b.frontWheel} / ${b.rearWheel}</b></div><div class="kpi"><span>${role==='dealer'?'整备预估':'链条'}</span><b>${role==='dealer'?d.recondition.split('，')[0]:b.chain}</b></div></div></section><div class="tabs">${tabs.map(t=>`<button class="tab ${activeTab===t?'active':''}" data-tab="${t}">${names[t]}</button>`).join('')}</div>`;
if(activeTab==='overview')html+=panel('基础车辆数据',`<div class="kv two">${Object.keys(labels).map(k=>row(labels[k],b[k])).join('')}</div>`)+panel(role==='dealer'?'车商快速判断':'车友快速判断',role==='dealer'?`${row('流通判断',d.tradeFit)}${row('重点扣价',d.deduct.slice(0,4).join('；'))}${row('验车优先级',d.priority.join(' > '))}`:`${row('适合程度',r.level)}${row('常见问题',r.issues.join('；'))}${row('推荐先查',b.oil||b.oil)}`,true);
if(activeTab==='check')html+=panel('现场三态查验',`<div class="muted">每项可标记正常、注意或严重。按钮只有在悬停、按下或选中时高亮，方便手机现场操作。</div><div class="progress"><div id="bar"></div></div><div class="cards">${checks.map((c,i)=>`<div class="check"><div class="check-title">${i+1}. ${c}</div><div class="states"><button class="state ok">正常</button><button class="state warn">注意</button><button class="state bad">严重</button></div></div>`).join('')}</div>`,true)+panel('车商手续与砍价点',chips(d.deduct,'chip orange'));
if(activeTab==='products')html+=productBlock('轮胎品牌与型号推荐',p.tires)+productBlock('链条与牙盘推荐',p.chain)+productBlock('油液与刹车推荐',p.oil)+productBlock('其他保养用品',p.other);
if(activeTab==='trade')html+=panel(role==='dealer'?'收车整备建议':'保养周期与车辆了解',role==='dealer'?`${row('库存风险',d.risk)}${row('整备成本',d.recondition)}${row('扣价点',d.deduct.join('；'))}${row('优先级',d.priority.join(' > '))}`:`${row('适合程度',r.level)}${row('常见问题',r.issues.join('；'))}${parts.map(x=>row(x.name,x.cycle)).join('')}`,true)+panel('易损耗配件检查',`<div class="cards">${parts.map(x=>`<article class="part"><div class="part-head"><h4>${x.name}</h4><em>${x.cycle}</em></div><p>${x.method}</p></article>`).join('')}</div>`);
document.getElementById('resultContent').innerHTML=html;document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;render()});document.querySelectorAll('.states .state').forEach(b=>b.onclick=()=>{b.parentElement.querySelectorAll('.state').forEach(x=>x.classList.remove('active'));b.classList.add('active');updateBar()});updateBar();window.scrollTo({top:0,behavior:'smooth'})}
function updateBar(){const groups=[...document.querySelectorAll('.states')];if(!groups.length)return;const done=groups.filter(g=>g.querySelector('.active')).length;const bar=document.getElementById('bar');if(bar)bar.style.width=(done/groups.length*100)+'%'}function search(q){const m=find(q);const nf=document.getElementById('notFound');if(m){current=m;activeTab=role==='dealer'?'check':'products';nf.style.display='none';render()}else{nf.style.display='block';nf.innerHTML=`<strong>暂未收录“${(q||'该车型').trim()}”</strong><br><span>可提交车型需求，后续补充该车型数据。</span>`;document.getElementById('home').style.display='block';document.getElementById('result').style.display='none'}}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{role=b.dataset.role;renderHome()});document.querySelectorAll('[data-search]').forEach(f=>f.onsubmit=e=>{e.preventDefault();search(f.querySelector('input').value)});document.getElementById('backBtn').onclick=()=>{document.getElementById('result').style.display='none';document.getElementById('home').style.display='block';window.scrollTo({top:0,behavior:'smooth'})};renderHome();
</script>
