function n(v){return String(v).toLowerCase().replace(/[\s\-_./]/g,'').trim()}function find(q){const nq=n(q);if(!nq)return null;return motorcycles.map(m=>{const hay=[m.name,m.brand,m.model,m.slug,...m.aliases];const score=hay.some(x=>n(x)===nq)?100:hay.some(x=>n(x).includes(nq)||nq.includes(n(x)))?60:0;return{m,score}}).sort((a,b)=>b.score-a.score)[0]?.score?motorcycles.map(m=>{const hay=[m.name,m.brand,m.model,m.slug,...m.aliases];return{m,score:hay.some(x=>n(x)===nq)?100:hay.some(x=>n(x).includes(nq)||nq.includes(n(x)))?60:0}}).sort((a,b)=>b.score-a.score)[0].m:null}function row(a,b){return`<div class="row"><span>${a}</span><span>${b}</span></div>`}function panel(t,h,alt=false){return`<section class="panel ${alt?'alt':''}"><h3>${t}</h3>${h}</section>`}function list(xs,cls='chip'){return`<div class="chips">${xs.map(x=>`<div class="${cls}">${x}</div>`).join('')}</div>`}
function renderHome(){document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.role===role));document.getElementById('modelGrid').innerHTML=motorcycles.map(m=>`<button class="model" data-model="${m.name}"><span>${m.brand}</span><strong>${m.model}</strong><small>${m.basic.displacement} · 风险 ${m.dealer.risk}</small></button>`).join('');document.getElementById('suggestions').innerHTML=motorcycles.map(m=>`<button data-model="${m.name}">${m.name}</button>`).join('');document.querySelectorAll('[data-model]').forEach(b=>b.onclick=()=>search(b.dataset.model))}
function render(){if(!current)return;document.getElementById('home').style.display='none';document.getElementById('result').style.display='block';document.querySelectorAll('[data-search] input').forEach(i=>i.value=current.name);const b=current.basic,d=current.dealer,r=current.rider;let tabs=['overview','check','maintain','trade'];let names={overview:'概览',check:'查验',maintain:'保养',trade:role==='dealer'?'收车':'了解'};let html=`<section class="summary"><div class="summary-head"><div><p>${current.brand}</p><h2>${current.model}</h2><div class="muted">${role==='dealer'?d.tradeFit:r.level}</div></div><span class="risk">风险 ${d.risk}</span></div><div class="kpis"><div class="kpi"><span>排量</span><b>${b.displacement}</b></div><div class="kpi"><span>座高</span><b>${b.seatHeight}</b></div><div class="kpi"><span>整备质量</span><b>${b.curbWeight}</b></div><div class="kpi"><span>${role==='dealer'?'整备预估':'推荐用途'}</span><b>${role==='dealer'?d.recondition.split('，')[0]:'通勤/长途'}</b></div></div></section><div class="tabs">${tabs.map(t=>`<button class="tab ${activeTab===t?'active':''}" data-tab="${t}">${names[t]}</button>`).join('')}</div>`;
if(activeTab==='overview')html+=panel('基础车辆数据',`<div class="kv two">${Object.keys(labels).map(k=>row(labels[k],b[k])).join('')}</div>`)+panel(role==='dealer'?'车商快速结论':'车友快速结论',role==='dealer'?`${row('流通判断',d.tradeFit)}${row('重点扣价',d.deduct.slice(0,3).join('；'))}${row('验车优先级',d.priority.join(' > '))}`:`${row('新手友好度',r.level)}${row('常见问题',r.issues.join('；'))}${row('轮胎规格',b.frontWheel+' / '+b.rearWheel)}`,true);
if(activeTab==='check')html+=panel('现场三态查验',`<div class="muted">每项可标记正常、注意或严重，适合车商收车和车友看车现场快速记录。</div><div class="progress"><div id="bar"></div></div>${checks.map((c,i)=>`<div class="check"><div class="check-title">${i+1}. ${c}</div><div class="states"><button class="ok" data-state>正常</button><button class="warn" data-state>注意</button><button class="bad" data-state>严重</button></div></div>`).join('')}`,true)+panel('手续核验',list(d.paperwork,'chip orange'));
if(activeTab==='maintain')html+=panel('易损耗配件与周期',parts.map(p=>`<article class="part"><div class="part-head"><h4>${p.name}</h4><em>${p.cycle}</em></div><p>${p.method}</p></article>`).join(''))+panel('车友保养计划',list(r.maintenance),true)+panel('轮胎使用建议',`<div class="chips"><div class="chip">通勤：${r.tires.commute}</div><div class="chip orange">跑山：${r.tires.sport}</div><div class="chip">长途：${r.tires.touring}</div></div>`);
if(activeTab==='trade')html+=panel(role==='dealer'?'车商收车建议':'车辆信息与购买建议',role==='dealer'?`${row('库存风险',d.risk)}${row('整备成本',d.recondition)}${row('扣价点',d.deduct.join('；'))}${row('优先级',d.priority.join(' > '))}`:`${row('适合程度',r.level)}${row('常见问题',r.issues.join('；'))}${row('购买重点',d.priority.join(' > '))}`,true);
document.getElementById('resultContent').innerHTML=html;document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;render()});document.querySelectorAll('[data-state]').forEach(b=>b.onclick=()=>{const group=b.parentElement;group.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');updateBar()});updateBar();window.scrollTo({top:0,behavior:'smooth'})}
function updateBar(){const groups=[...document.querySelectorAll('.states')];if(!groups.length)return;const done=groups.filter(g=>g.querySelector('.active')).length;const bar=document.getElementById('bar');if(bar)bar.style.width=(done/groups.length*100)+'%'}function search(q){const m=find(q);const nf=document.getElementById('notFound');if(m){current=m;activeTab=role==='dealer'?'check':'overview';nf.style.display='none';render()}else{nf.style.display='block';nf.innerHTML=`<strong>暂未收录“${(q||'该车型').trim()}”</strong><br><span>可提交车型需求，后续补充该车型数据。</span>`;document.getElementById('home').style.display='block';document.getElementById('result').style.display='none'}}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{role=b.dataset.role;renderHome()});document.querySelectorAll('[data-search]').forEach(f=>f.onsubmit=e=>{e.preventDefault();search(f.querySelector('input').value)});document.getElementById('backBtn').onclick=()=>{document.getElementById('result').style.display='none';document.getElementById('home').style.display='block';window.scrollTo({top:0,behavior:'smooth'})};renderHome();
</script>
</body>
</html>
