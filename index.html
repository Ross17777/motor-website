const labels={cc:'排量',engine:'发动机',seat:'座高',weight:'整备质量',tank:'油箱',front:'前轮',rear:'后轮',chain:'传动/链条',oil:'机油建议'};let current=null,activeTab='maint';
function n(v){return String(v).toLowerCase().replace(/[\s\-_./]/g,'').trim()}function row(a,b){return`<div class="row"><span>${a}</span><span>${b}</span></div>`}function panel(t,h,c=''){return`<section class="panel ${c}"><h3>${t}</h3>${h}</section>`}function info(list){return`<div class="info-grid">${list.map(x=>`<div class="info"><h4>${x}</h4></div>`).join('')}</div>`}function prices(obj){return Object.entries(obj).map(([k,items])=>`<details><summary>${k==='tires'?'轮胎新品参考价':k==='drive'?'链条/传动新品参考价':'油液/刹车新品参考价'}</summary><div class="price-body">${items.map(i=>`<div class="price-item"><b>${i[0]}</b><span>${i[1]} · ${i[2]}</span></div>`).join('')}</div></details>`).join('')}
function renderBrands(){const brands=[...new Set(bikes.map(b=>b.brand))].sort();document.getElementById('brand').innerHTML='<option value="all">全部品牌</option>'+brands.map(b=>`<option>${b}</option>`).join('');document.getElementById('categoryChips').innerHTML=['全部','仿赛','街车','休旅','踏板','巡航'].map((c,i)=>`<button class="chip ${i===0?'active':''}" data-cat="${i===0?'all':c}">${c}</button>`).join('');document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{document.getElementById('category').value=b.dataset.cat;document.querySelectorAll('[data-cat]').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderList()});document.getElementById('hotChips').innerHTML=bikes.slice(0,8).map(b=>`<button class="chip" data-open="${b.name}">${b.name}</button>`).join('');document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openBike(b.dataset.open))}
function match(b){const text=n(document.getElementById('filterText').value||document.getElementById('q').value);const cat=document.getElementById('category').value;const origin=document.getElementById('origin').value;const brand=document.getElementById('brand').value;const hay=n([b.name,b.brand,b.model,b.category,b.origin,...(b.aliases||[])].join(' '));return(!text||hay.includes(text))&&(cat==='all'||b.category===cat)&&(origin==='all'||b.origin===origin)&&(brand==='all'||b.brand===brand)}
function renderList(){const list=bikes.filter(match);document.getElementById('countText').textContent=`已收录 ${bikes.length} 台 / 当前 ${list.length} 台`;document.getElementById('empty').style.display=list.length?'none':'block';document.getElementById('bikeGrid').innerHTML=list.map(b=>`<button class="card" data-bike="${b.name}"><div class="card-top"><span>${b.brand} · ${b.origin}</span><span>${b.category}</span></div><h3>${b.model}</h3><p>${b.summary}</p><div class="meta"><span>${b.spec.cc}</span><span>${b.spec.front}/${b.spec.rear}</span><span>${b.spec.chain}</span></div></button>`).join('');document.querySelectorAll('[data-bike]').forEach(btn=>btn.onclick=()=>openBike(btn.dataset.bike))}
function openBike(name){const b=bikes.find(x=>x.name===name)||bikes.find(x=>[x.name,x.model,...x.aliases].some(a=>n(a)===n(name)||n(a).includes(n(name))));if(!b)return;current=b;document.getElementById('home').style.display='none';document.getElementById('detail').style.display='block';document.getElementById('backBtn').style.display='inline-flex';activeTab='maint';renderDetail()}
function renderDetail(){const b=current;let tabs=['overview','maint','mods','used'];let names={overview:'基础信息',maint:'保养耗材',mods:'改装参考',used:'二手看车'};let html=`<section class="summary"><div class="summary-head"><div><small>${b.brand} · ${b.origin} · ${b.category}</small><h2>${b.name}</h2><div class="source">数据来源：${b.source}</div></div><span class="pill">${b.category}</span></div><div class="kpis"><div class="kpi"><span>排量</span><b>${b.spec.cc}</b></div><div class="kpi"><span>座高</span><b>${b.spec.seat}</b></div><div class="kpi"><span>轮胎</span><b>${b.spec.front} / ${b.spec.rear}</b></div><div class="kpi"><span>链条/传动</span><b>${b.spec.chain}</b></div></div></section><div class="tabs">${tabs.map(t=>`<button class="tab ${activeTab===t?'active':''}" data-tab="${t}">${names[t]}</button>`).join('')}</div>`;if(activeTab==='overview')html+=panel('官方/公开基础规格',`<div class="rows">${Object.keys(labels).map(k=>row(labels[k],b.spec[k])).join('')}</div>`)+panel('车型定位',`<p class="source">${b.summary}</p>`,'green');if(activeTab==='maint')html+=panel('常规保养周期',info(b.maint),'green')+panel('配件全新市场价（可展开）',prices(b.prices));if(activeTab==='mods')html+=panel('常见改装方向',info(b.mods),'green')+panel('改装建议',`<div class="info-grid"><div class="info"><h4>先安全后外观</h4><p>优先轮胎、刹车、护具和照明，再考虑外观件。</p></div><div class="info"><h4>保留原厂件</h4><p>便于年检、二手转让和恢复原厂状态。</p></div><div class="info"><h4>电路别乱接</h4><p>射灯、USB、胎压监测等加装需要保险、防水和规范走线。</p></div></div>`);if(activeTab==='used')html+=panel('二手看车辅助清单',`<div class="info-grid">${b.inspect.map((x,i)=>`<div class="info"><h4>${i+1}. ${x}</h4><div class="states"><button class="state ok">正常</button><button class="state warn">注意</button><button class="state bad">严重</button></div></div>`).join('')}</div>`,'green');document.getElementById('detail').innerHTML=html;document.querySelectorAll('[data-tab]').forEach(btn=>btn.onclick=()=>{activeTab=btn.dataset.tab;renderDetail()});document.querySelectorAll('.state').forEach(btn=>btn.onclick=()=>{btn.parentElement.querySelectorAll('.state').forEach(x=>x.classList.remove('active'));btn.classList.add('active')});window.scrollTo({top:0,behavior:'smooth'})}
function search(){const q=document.getElementById('q').value.trim();if(!q){renderList();return}const found=bikes.find(b=>n([b.name,b.brand,b.model,...b.aliases].join(' ')).includes(n(q)));if(found)openBike(found.name);else{document.getElementById('filterText').value=q;renderList()}}
document.getElementById('searchForm').onsubmit=e=>{e.preventDefault();search()};['filterText','category','origin','brand'].forEach(id=>document.getElementById(id).oninput=renderList);document.getElementById('backBtn').onclick=()=>{document.getElementById('detail').style.display='none';document.getElementById('home').style.display='block';document.getElementById('backBtn').style.display='none';window.scrollTo({top:0,behavior:'smooth'})};renderBrands();renderList();
</script>
