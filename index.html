<body>
  <main id="home">
    <section class="hero">

];
const checklist = ["发动机冷车启动是否顺畅","怠速是否稳定","是否有异响","车架是否有摔车痕迹","前后减震是否漏油","刹车盘是否磨损严重","链条和牙盘是否磨损","轮胎年份和磨损程度","仪表公里数是否合理","车架号、发动机号、手续是否一致"];
const wearParts = ["机油|查看油色、油位和保养记录，冷车启动后听润滑噪音。|3000-5000 km","机滤|询问上次更换记录，观察机滤外壳是否渗油。|随机油或隔次更换","空滤|查看进气盒和滤芯灰尘，灰尘路况缩短周期。|8000-12000 km","火花塞|冷车启动困难、加速顿挫时重点检查。|12000-20000 km","刹车片|看摩擦片厚度，试车确认刹车手感是否线性。|按磨损更换","刹车油|观察油色是否发深，捏刹车是否发软。|1-2 年","链条|检查松紧、死节、锈蚀和调节刻度是否到极限。|15000-25000 km","前后牙盘|观察齿尖是否变尖、偏磨或有缺齿。|随链条状态","轮胎|看胎纹、偏磨、补胎痕迹和 DOT 年份。|3-5 年或磨耗线","电瓶|冷启动电压和启动马达转速是否正常。|2-4 年","冷却液|查看副水壶液位、颜色和水箱渗漏痕迹。|2 年左右"].map(x=>{const [name,checkMethod,interval]=x.split("|");return {name,checkMethod,interval};});

function normalize(v){ return String(v).toLowerCase().replace(/[\s\-_./]/g,"").trim(); }
function findMoto(q){ const nq=normalize(q); if(!nq) return null; return motorcycles.map(m=>{const hay=[m.name,m.brand,m.model,m.slug,...m.aliases]; const exact=hay.some(x=>normalize(x)===nq); const partial=hay.some(x=>normalize(x).includes(nq)||nq.includes(normalize(x))); return {m,score:exact?100:partial?60:0};}).sort((a,b)=>b.score-a.score)[0]?.score ? motorcycles.map(m=>({m,score:[m.name,m.brand,m.model,m.slug,...m.aliases].some(x=>normalize(x)===nq)?100:[m.name,m.brand,m.model,m.slug,...m.aliases].some(x=>normalize(x).includes(nq)||nq.includes(normalize(x)))?60:0})).sort((a,b)=>b.score-a.score)[0].m : null; }
function row(label,value){ return `<div class="row"><span>${label}</span><span>${value}</span></div>`; }
function panel(title, html, alt=false){ return `<section class="panel ${alt?'alt':''}"><h3>${title}</h3>${html}</section>`; }
function renderMoto(m){ document.getElementById('home').style.display='none'; document.getElementById('result').style.display='block'; document.querySelectorAll('[data-search] input').forEach(i=>i.value=m.name); const b=m.basic, t=m.tireInfo, ma=m.maintenanceInfo, ad=m.buyingAdvice; document.getElementById('resultContent').innerHTML = `<section class="summary"><div><p>${m.brand}</p><h2>${m.model}</h2><div class="desc">面向二手购买现场的参数、耗材和风险参考。</div></div><span class="risk">风险 ${ad.riskLevel}</span></section>` + panel('基础车辆数据', `<div class="kv two">${Object.keys(labels).map(k=>row(labels[k],b[k])).join('')}</div>`) + panel('二手车验车重点', `<div class="checks">${checklist.map(x=>`<label class="check"><input type="checkbox"><span>${x}</span></label>`).join('')}</div>`, true) + panel('易损耗配件检查', `<div class="parts">${wearParts.map(p=>`<article class="part"><div class="part-head"><h4>${p.name}</h4><em>${p.interval}</em></div><p>${p.checkMethod}</p></article>`).join('')}</div>`) + panel('可用轮胎信息', `<div class="kv">${row('前轮规格',t.front)}${row('后轮规格',t.rear)}${row('可替换规格',t.alternatives.join(' / '))}</div><div class="chips"><div class="chip"><b>通勤</b>${t.commuting}</div><div class="chip orange"><b>跑山</b>${t.sport}</div><div class="chip blue"><b>长途摩旅</b>${t.touring}</div></div>`, true) + panel('保养用品数据', `<div class="kv">${Object.keys(maintLabels).map(k=>row(maintLabels[k],ma[k])).join('')}</div>`) + panel('购买建议', `<div class="kv">${row('适合新手程度',ad.beginnerFriendly)}${row('常见问题',ad.commonIssues.join('；'))}${row('二手购买风险等级',ad.riskLevel)}${row('重点砍价点',ad.bargainingPoints.join('；'))}${row('建议验车优先级',ad.priority.join(' > '))}</div>`, true); window.scrollTo({top:0,behavior:'smooth'}); }
function doSearch(q){ const m=findMoto(q); const nf=document.getElementById('notFound'); if(m){ nf.style.display='none'; renderMoto(m); } else { nf.style.display='block'; nf.innerHTML=`<strong>暂未收录“${q.trim() || '该车型'}”</strong><br><span>可提交车型需求，后续会补充该车型数据。</span>`; document.getElementById('home').style.display='block'; document.getElementById('result').style.display='none'; } }
document.getElementById('modelGrid').innerHTML = motorcycles.map(m=>`<button class="model-card" data-model="${m.name}"><span>${m.brand}</span><strong>${m.model}</strong><small>${m.basic.displacement}</small></button>`).join('');
document.querySelectorAll('[data-model]').forEach(btn=>btn.addEventListener('click',()=>doSearch(btn.dataset.model)));
document.querySelectorAll('[data-search]').forEach(form=>form.addEventListener('submit',e=>{e.preventDefault(); doSearch(form.querySelector('input').value);}));
document.getElementById('backBtn').addEventListener('click',()=>{document.getElementById('result').style.display='none';document.getElementById('home').style.display='block';window.scrollTo({top:0,behavior:'smooth'});});
</script>
</body>
</html>
