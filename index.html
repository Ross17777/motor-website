钱江 SRK800|钱江|国产|街车|778cc|标准版:¥49999`;const partGuide={tires:[['Michelin Road 6 / Power 6','¥1800-4800','通勤、跑山常用'],['Pirelli Diablo Rosso IV / Angel GT II','¥1900-5200','运动或长途'],['Bridgestone S23 / T32','¥2000-4800','运动与休旅'],['Dunlop Roadsmart IV / GPR-300','¥1200-3600','均衡预算']],drive:[['D.I.D 520VX3 / 525VX3','¥550-1300','常见街道升级链条'],['RK 520XSO / 525GXW','¥450-1500','经济到高规格'],['EK 520SRX2 / 525ZVX3','¥550-1500','替换选择'],['JT / Sunstar 牙盘','¥250-1300','按齿比与车型确认']],fluids:[['Motul 7100 10W-40','¥95-150/L','常见全合成机油'],['Shell Advance Ultra','¥80-140/L','通勤保养常用'],['Brembo / EBC / SBS 刹车片','¥180-1300','按卡钳型号确认'],['DOT4 / RBF600 刹车油','¥60-220','1-2 年检查更换']]};const rows=raw.trim().split('\n').slice(0,100);const bikes=rows.map(line=>{let[name,brand,origin,category,cc,priceStr]=line.split('|');let prices=priceStr.split(',').map(x=>{let[v,p]=x.split(':');return{v,p}});return{name,brand,origin,category,cc,prices,starter:parseInt(cc)<=500||['川崎 Ninja 400','本田 CBR500R','雅马哈 YZF-R3','KTM 390 Duke','Aprilia RS457','春风 450SR','豪爵铃木 DL250'].includes(name),maint:['按用户手册周期更换机油和机滤','轮胎按 DOT 年份、磨耗线和用途选择','刹车油建议 1-2 年检查或更换','链条车型建议 500-800km 清洁润滑'],mods:['优先升级轮胎、刹车和安全防护','通勤可加 USB、手机支架、尾包架','跑山用户关注轮胎、刹车片和避震设定','改装保留原厂件，方便年检和二手转让'],used:['核对手续、车架号和发动机号','检查摔车痕迹、车把限位和外观色差','查看保养记录、轮胎年份和链条牙盘','试车关注冷启动、怠速和异响']}});let current=null,tab='maint';function priceHtml(b){return`<details class="drawer"><summary>版本指导价</summary>${b.prices.map(x=>`<div class="price-row"><span>${x.v}</span><span>${x.p}</span></div>`).join('')}</details>`}function partsHtml(){return Object.entries(partGuide).map(([k,items])=>`<details class="drawer"><summary>${k==='tires'?'轮胎新品参考':k==='drive'?'链条/牙盘新品参考':'油液/刹车新品参考'}</summary>${items.map(x=>`<div class="price-row"><span>${x[0]}<br><small>${x[2]}</small></span><span>${x[1]}</span></div>`).join('')}</details>`).join('')}function card(b){return`<button class="card" data-bike="${b.name}"><div class="card-top"><span>${b.brand} · ${b.origin}</span><span>${b.category}</span></div><h3>${b.name}</h3><div class="meta"><span>${b.prices[0].p}</span><span>${b.cc}</span></div>${priceHtml(b)}</button>`}function renderLists(){let q=(document.getElementById('filterText')?.value||'').toLowerCase();let cat=document.getElementById('category')?.value||'all';let org=document.getElementById('origin')?.value||'all';let br=document.getElementById('brand')?.value||'all';let list=bikes.filter(b=>(!q||(b.name+b.brand).toLowerCase().includes(q))&&(cat==='all'||b.category===cat)&&(org==='all'||b.origin===org)&&(br==='all'||b.brand===br));document.getElementById('countText').textContent=`${list.length} / ${bikes.length}`;document.getElementById('bikeGrid').innerHTML=list.map(card).join('');document.getElementById('empty').style.display=list.length?'none':'block';document.getElementById('starterGrid').innerHTML=bikes.filter(b=>b.starter).slice(0,12).map(card).join('');document.querySelectorAll('[data-bike]').forEach(x=>x.onclick=()=>openBike(x.dataset.bike))}function init(){let brands=[...new Set(bikes.map(b=>b.brand))].sort();document.getElementById('brand').innerHTML='<option value="all">全部品牌</option>'+brands.map(b=>`<option>${b}</option>`).join('');let cats=['全部','仿赛','街车','休旅','ADV','复古','巡航','踏板'];document.getElementById('categoryChips').innerHTML=cats.map((c,i)=>`<button class="chip ${i===0?'active':''}" data-cat="${i===0?'all':c}">${c}</button>`).join('');document.querySelectorAll('[data-cat]').forEach(c=>c.onclick=()=>{document.getElementById('category').value=c.dataset.cat;document.querySelectorAll('[data-cat]').forEach(x=>x.classList.remove('active'));c.classList.add('active');renderLists()});renderLists()}function row(k,v){return`<div class="row"><span>${k}</span><span>${v}</span></div>`}function info(list){return`<div class="info-grid">${list.map(x=>`<div class="info"><h3>${x}</h3></div>`).join('')}</div>`}function panel(t,h){return`<section class="panel"><h2>${t}</h2>${h}</section>`}function openBike(name){current=bikes.find(b=>b.name===name);document.getElementById('home').style.display='none';document.getElementById('detail').style.display='block';document.getElementById('backBtn').style.display='inline-flex';tab='maint';renderDetail()}function renderDetail(){let b=current;let tabs={overview:'基础信息',maint:'保养耗材',mods:'改装参考',used:'二手看车'};let html=`<section class="detail-card"><div class="detail-head"><div><small>${b.brand} · ${b.origin} · ${b.category}</small><h1>${b.name}</h1></div><span class="badge">${b.prices[0].p}</span></div><div class="kpis"><div class="kpi"><span>排量</span><b>${b.cc}</b></div><div class="kpi"><span>分类</span><b>${b.category}</b></div><div class="kpi"><span>品牌</span><b>${b.brand}</b></div><div class="kpi"><span>版本</span><b>${b.prices.length} 个</b></div></div></section><div class="tabs">${Object.entries(tabs).map(([k,v])=>`<button class="tab ${tab===k?'active':''}" data-tab="${k}">${v}</button>`).join('')}</div>`;if(tab==='overview')html+=panel('基础资料',`<div class="rows">${row('指导价',b.prices.map(x=>x.v+' '+x.p).join(' / '))}${row('排量',b.cc)}${row('轮胎/机油/链条','按年款和用户手册核对')}</div>`);if(tab==='maint')html+=panel('保养建议',info(b.maint))+panel('配件全新市场价格',partsHtml());if(tab==='mods')html+=panel('改装方向',info(b.mods));if(tab==='used')html+=panel('二手看车重点',info(b.used));document.getElementById('detail').innerHTML=html;document.querySelectorAll('[data-tab]').forEach(x=>x.onclick=()=>{tab=x.dataset.tab;renderDetail()});window.scrollTo({top:0,behavior:'smooth'})}document.getElementById('searchForm').onsubmit=e=>{e.preventDefault();let q=document.getElementById('q').value.toLowerCase();let b=bikes.find(x=>(x.name+x.brand).toLowerCase().includes(q));if(b)openBike(b.name);else{document.getElementById('filterText').value=q;renderLists();location.hash='catalog'}};['filterText','category','origin','brand'].forEach(id=>document.getElementById(id).oninput=renderLists);document.getElementById('backBtn').onclick=()=>{document.getElementById('detail').style.display='none';document.getElementById('home').style.display='block';document.getElementById('backBtn').style.display='none';window.scrollTo({top:0,behavior:'smooth'})};init();</script></body></html>
