const labels={cc:'排量',engine:'发动机',seat:'座高',weight:'整备质量',front:'前轮',rear:'后轮',chain:'链条/传动',oil:'机油建议'};let current=null,activeTab='maint';
function n(v){return String(v).toLowerCase().replace(/[\s\-_./]/g,'').trim()}function row(a,b){return`<div class="row"><span>${a}</span><span>${b}</span></div>`}function panel(t,h,c=''){return`<section class="panel ${c}"><h3>${t}</h3>${h}</section>`}function info(list){return`<div class="info-grid">${list.map(x=>`<div class="info"><h4>${x}</h4></div>`).join('')}</div>`}function priceDrawers(obj){return Object.entries(obj).map(([k,items])=>`<details><summary>${k==='tires'?'轮胎全新市场价':k==='parts'?'链条/牙盘/刹车件全新市场价':'油液/空滤全新市场价'}</summary><div class="price-body">${items.map(i=>`<div class="price-item"><b>${i[0]}</b><span>${i[1]} · ${i[2]}</span></div>`).join('')}</div></details>`).join('')}
function init(){const brands=[...new Set(bikes.map(b=>b.brand))].sort();document.getElementById('brand').innerHTML='<option value="all">全部品牌</option>'+brands.map(b=>`<option>${b}</option>`).join('');document.getElementById('categoryChips').innerHTML=['全部','仿赛','街车','休旅','复古'].map((c,i)=>`<button class="chip ${i===0?'active':''}" data-cat="${i===0?'all':c}">${c}</button>`).join('');document.querySelectorAll('[data-cat]').forEach(btn=>btn.onclick=()=>{document.getElementById('category').value=btn.dataset.cat;document.querySelectorAll('[data-cat]').forEach(x=>x.classList.remove('active'));btn.classList.add('active');renderList()});renderList()}
function match(b){const text=n(document.getElementById('filterText').value||document.getElementById('q').value);const cat=document.getElementById('category').value;const origin=document.getElementById('origin').value;const brand=document.getElementById('brand').value;const hay=n([b.name,b.brand,b.category,b.origin].join(' '));return(!text||hay.includes(text))&&(cat==='all'||b.category===cat)&&(origin==='all'||b.origin===origin)&&(brand==='all'||b.brand===brand)}function renderList(){const list=bikes.filter(match);document.getElementById('countText').textContent=`${list.length} / ${bikes.length}`;document.getElementById('empty').style.display=list.length?'none':'block';document.getElementById('bikeGrid').innerHTML=list.map(b=>`<button class="bike" data-bike="${b.name}"><div class="bike-top"><span>${b.brand} · ${b.origin}</span><span>${b.category}</span></div><h3>${b.name}</h3><div class="bike-meta"><span>${b.price}</span><span>${b.spec.cc}</span></div></button>`).join('');document.querySelectorAll('[data-bike]').forEach(btn=>btn.onclick=()=>openBike(btn.dataset.bike))}
function openBike(name){const b=bikes.find(x=>x.name===name)||bikes.find(x=>n(x.name).includes(n(name)));if(!b)return;current=b;document.getElementById('home').style.display='none';document.getElementById('detail').style.display='block';document.getElementById('backBtn').style.display='inline-flex';activeTab='maint';renderDetail()}function renderDetail(){const b=current;const tabs=['overview','maint','mods','used'];const names={overview:'基础信息',maint:'保养耗材',mods:'改装参考',used:'二手看车'};let html=`<section class="hero-card"><div class="detail-head"><div><small>${b.brand} · ${b.origin} · ${b.category}</small><h1>${b.name}</h1><div class="source">数据来源：${b.source}</div></div><span class="badge">${b.price}</span></div><div class="kpis"><div class="kpi"><span>排量</span><b>${b.spec.cc}</b></div><div class="kpi"><span>座高</span><b>${b.spec.seat}</b></div><div class="kpi"><span>前轮</span><b>${b.spec.front}</b></div><div class="kpi"><span>后轮</span><b>${b.spec.rear}</b></div></div></section><div class="tabs">${tabs.map(t=>`<button class="tab ${activeTab===t?'active':''}" data-tab="${t}">${names[t]}</button>`).join('')}</div>`;if(activeTab==='overview')html+=panel('基础规格',`<div class="rows">${Object.keys(labels).map(k=>row(labels[k],b.spec[k])).join('')}</div>`);if(activeTab==='maint')html+=panel('常规保养周期',info(b.maint),'green')+panel('配件全新市场价格（点击展开）',priceDrawers(b.prices));if(activeTab==='mods')html+=panel('常见改装方向',info(b.mods),'green');if(activeTab==='used')html+=panel('二手看车重点',info(b.inspect),'green');document.getElementById('detail').innerHTML=html;document.querySelectorAll('[data-tab]').forEach(btn=>btn.onclick=()=>{activeTab=btn.dataset.tab;renderDetail()});window.scrollTo({top:0,behavior:'smooth'})}
function search(){const q=document.getElementById('q').value.trim();if(!q){renderList();return}const found=bikes.find(b=>n([b.name,b.brand].join(' ')).includes(n(q)));if(found)openBike(found.name);else{document.getElementById('filterText').value=q;renderList()}}document.getElementById('searchForm').onsubmit=e=>{e.preventDefault();search()};['filterText','category','origin','brand'].forEach(id=>document.getElementById(id).oninput=renderList);document.getElementById('backBtn').onclick=()=>{document.getElementById('detail').style.display='none';document.getElementById('home').style.display='block';document.getElementById('backBtn').style.display='none';window.scrollTo({top:0,behavior:'smooth'})};init();
</script>
