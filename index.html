function norm(v){return String(v).toLowerCase().replace(/[\s\-_./]/g,'').trim()}function find(q){const nq=norm(q);if(!nq)return null;const s=bikes.map(b=>{const hay=[b.name,b.brand,b.model,...b.aliases];const score=hay.some(x=>norm(x)===nq)?100:hay.some(x=>norm(x).includes(nq)||nq.includes(norm(x)))?60:0;return{b,score}}).sort((a,b)=>b.score-a.score);return s[0].score?s[0].b:null}function row(a,b){return`<div class="row"><span>${a}</span><span>${b}</span></div>`}function panel(t,h,alt=false){return`<section class="panel ${alt?'alt':''}"><h3>${t}</h3>${h}</section>`}function cards(items){return`<div class="cards product-grid">${items.map(([scene,name,note])=>`<article class="card"><div class="card-head"><h4>${name}</h4><em>${scene}</em></div><p>${note}</p></article>`).join('')}</div>`}function chips(items,cls='chip'){return`<div class="chip-grid">${items.map(x=>`<div class="${cls}">${x}</div>`).join('')}</div>`}
function renderHome(){document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));document.getElementById('bikeGrid').innerHTML=bikes.map(b=>`<button class="bike" data-bike="${b.name}"><div class="top"><span>${b.brand}</span><span>${b.basic.displacement}</span></div><strong>${b.model}</strong><small>${b.summary}</small></button>`).join('');document.getElementById('quick').innerHTML=bikes.map(b=>`<button class="btn ghost" data-bike="${b.name}">${b.name}</button>`).join('');document.querySelectorAll('[data-bike]').forEach(b=>b.onclick=()=>search(b.dataset.bike))}
function render(){if(!current)return;document.getElementById('home').style.display='none';document.getElementById('result').style.display='block';document.querySelectorAll('[data-search] input').forEach(i=>i.value=current.name);const b=current.basic,p=current.products;const tabs=['overview','maintain','modify','inspect'];const names={overview:'概览',maintain:'保养耗材',modify:'改装参考',inspect:'二手看车'};let html=`<section class="summary"><div class="summary-head"><div><p>${current.brand}</p><h2>${current.model}</h2><div class="note">${current.summary}</div></div><span class="tag-main">玩车资料</span></div><div class="kpis"><div class="kpi"><span>排量</span><b>${b.displacement}</b></div><div class="kpi"><span>座高</span><b>${b.seat}</b></div><div class="kpi"><span>轮胎</span><b>${b.front} / ${b.rear}</b></div><div class="kpi"><span>链条</span><b>${b.chain}</b></div></div></section><div class="tabs">${tabs.map(t=>`<button class="tab ${tab===t?'active':''}" data-tab="${t}">${names[t]}</button>`).join('')}</div>`;
if(tab==='overview')html+=panel('基础规格',`<div class="kv two">${Object.keys(labels).map(k=>row(labels[k],b[k])).join('')}</div>`)+panel('适合谁看',`${row('车友用途','保养、耗材购买、轮胎链条选择、轻改方向')}${row('二手用途','看车前快速了解常见风险和检查重点')}`,true);
if(tab==='maintain')html+=panel('轮胎品牌与型号',cards(p.tires),true)+panel('链条与牙盘',cards(p.chain),true)+panel('油液与刹车',cards(p.fluids),true);
if(tab==='modify')html+=panel('改装方向参考',cards(p.mods),true)+panel('改装前提醒',chips(['优先轮胎、刹车、护具和舒适性，再考虑外观和动力。','保留原厂件，方便年检、验车和二手转让。','电路类改装必须加保险、防水接头，避免亏电和短路。'],'chip orange'));
if(tab==='inspect')html+=panel('二手看车重点',`<div class="progress"><div id="bar"></div></div><div class="cards">${current.inspect.map((x,i)=>`<div class="card"><div class="card-head"><h4>${i+1}. ${x}</h4><em>看车</em></div><div class="states"><button class="state ok">正常</button><button class="state warn">注意</button><button class="state bad">严重</button></div></div>`).join('')}</div>`,true);
document.getElementById('resultContent').innerHTML=html;document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});document.querySelectorAll('.state').forEach(b=>b.onclick=()=>{b.parentElement.querySelectorAll('.state').forEach(x=>x.classList.remove('active'));b.classList.add('active');updateBar()});updateBar();window.scrollTo({top:0,behavior:'smooth'})}
function updateBar(){const groups=[...document.querySelectorAll('.states')];if(!groups.length)return;const done=groups.filter(g=>g.querySelector('.active')).length;const bar=document.getElementById('bar');if(bar)bar.style.width=(done/groups.length*100)+'%'}function search(q){const b=find(q);const nf=document.getElementById('notFound');if(b){current=b;tab=mode==='modify'?'modify':mode==='inspect'?'inspect':'maintain';nf.style.display='none';render()}else{nf.style.display='block';nf.innerHTML=`<strong>暂未收录“${(q||'该车型').trim()}”</strong><br><span>后续可补充该车型的保养和改装资料。</span>`;document.getElementById('home').style.display='block';document.getElementById('result').style.display='none'}}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;renderHome()});document.querySelectorAll('[data-search]').forEach(f=>f.onsubmit=e=>{e.preventDefault();search(f.querySelector('input').value)});document.getElementById('backBtn').onclick=()=>{document.getElementById('result').style.display='none';document.getElementById('home').style.display='block';window.scrollTo({top:0,behavior:'smooth'})};renderHome();
</script>
</body>
</html>
